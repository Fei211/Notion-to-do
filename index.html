<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Cute Floating To-Do</title>
<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial;
  background:linear-gradient(180deg,#ffd6ec,#ffe9c9);
  overflow:hidden;
}
.card{
  background:white;
  padding:28px 32px;
  border-radius:24px;
  width:320px;
  box-shadow:0 15px 35px rgba(0,0,0,0.12);
  position:relative;
  z-index:2;
}
h1{
  font-size:22px;
  margin-bottom:18px;
  text-align:center;
}
ul{
  list-style:none;
  padding:0;
  margin:0 0 16px 0;
}
li{
  display:flex;
  align-items:center;
  gap:10px;
  padding:8px 0;
  font-size:15px;
  border-bottom: 1px solid #fff5f9;
}
/* This makes the text grow so the delete button stays on the right */
.task-text {
  flex-grow: 1;
}
.delete-btn {
  background: none;
  border: none;
  cursor: pointer;
  font-size: 12px;
  opacity: 0.5;
  transition: opacity 0.2s;
}
.delete-btn:hover {
  opacity: 1;
}
input[type="text"]{
  width:100%;
  box-sizing: border-box; /* keeps input from poking out of the card */
  padding:10px;
  border-radius:12px;
  border:1px solid #eee;
  outline:none;
}
button#addBtn{
  margin-top:10px;
  width:100%;
  padding:10px;
  border:none;
  border-radius:12px;
  background:#ff8ac6;
  color:white;
  cursor:pointer;
  font-weight:600;
}
button#addBtn:hover{
  opacity:0.9;
}
/* floating emojis */
.float{
  position:absolute;
  font-size:28px;
  animation:floatUp linear forwards; /* changed infinite to forwards for better cleanup */
  opacity:0.9;
  z-index: 1;
}
@keyframes floatUp{
  from{ transform:translateY(110vh) rotate(0deg); }
  to{ transform:translateY(-20vh) rotate(360deg); }
}
</style>
</head>
<body>

<div class="card">
  <h1>&#127808; To-Do &#x1F380;</h1>
  <ul id="list"></ul>
  <input type="text" id="taskInput" placeholder="Add a task..." />
  <button id="addBtn" onclick="addTask()">Add task</button>
</div>

<script>
function addTask(){
  const input=document.getElementById('taskInput');
  const text=input.value.trim();
  if(!text) return;

  const li=document.createElement('li');

  // 1. Checkbox
  const checkbox = document.createElement('input');
  checkbox.type = 'checkbox';
  checkbox.style.width = '18px';
  checkbox.style.height = '18px';

  // 2. Task Text (using a span)
  const span = document.createElement('span');
  span.className = 'task-text';
  span.textContent = text;

  // 3. Delete Button (using the ? code)
  const deleteBtn = document.createElement('button');
  deleteBtn.innerHTML = '&#10060;';
  deleteBtn.className = 'delete-btn';
  
  deleteBtn.onclick = () => {
    li.remove();
  };

  checkbox.onchange=()=>{
    span.style.textDecoration=checkbox.checked?'line-through':'none';
    span.style.opacity=checkbox.checked?'0.5':'1';
  };

  li.appendChild(checkbox);
  li.appendChild(span);
  li.appendChild(deleteBtn);

  document.getElementById('list').appendChild(li);
  input.value='';
}

const inputField=document.getElementById('taskInput');
inputField.addEventListener('keypress',function(e){ 
  if(e.key==='Enter') addTask(); 
});

/* floating pancakes and money */
const emojis=['&#x1F380;','&#x1F9F8;','&#x1F9F8;','&#128184;','&#128184;','&#129374;','&#x2728;'];

function createFloat(){
  const el=document.createElement('div');
  el.className='float';
  el.innerHTML=emojis[Math.floor(Math.random()*emojis.length)];
  el.style.left=Math.random()*100+'vw';
  el.style.animationDuration=(6+Math.random()*8)+'s';
  el.style.fontSize=(24+Math.random()*20)+'px';
  document.body.appendChild(el);
  setTimeout(()=>{ el.remove(); },14000);
}
setInterval(createFloat,900);
</script>

</body>
</html>
